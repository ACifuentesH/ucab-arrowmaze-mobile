# CI del frontend Flutter — espejo del workflow del backend
# (docs/backend-context.md §3): mismos triggers, concurrency que cancela
# corridas viejas y pipeline install(lockfile) -> analyze -> test -> build.
name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: frontend-ci
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2 # misma versión que el equipo (Dart 3.12)
          cache: true

      - name: Install dependencies (lockfile estricto)
        run: flutter pub get --enforce-lockfile

      # Errores y warnings rompen el build; los hints informativos no.
      - name: Analyze
        run: flutter analyze --no-pub --no-fatal-infos

      - name: Test
        run: flutter test --no-pub

      - name: Build (web)
        run: flutter build web --release --no-pub
